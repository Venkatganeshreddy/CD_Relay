<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />

  <link rel="stylesheet" href="styles.css?v=16" />
</head>
<body data-mononum="on">
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- Offline Concierge shim: the design sandbox injected window.claude.complete.
       Outside it, provide a deterministic grounded responder so Concierge still demos. -->
  <script>
    if (!window.claude) {
      window.claude = {
        complete: async ({ messages }) => {
          await new Promise((r) => setTimeout(r, 350));
          const q = (messages[messages.length - 1].content || '').toLowerCase();
          if (q.includes('blocker') || q.includes('blocked'))
            return "Two blockers are over three days old. The NAT throttle on Fullstack labs [r-1001] has been open since Monday and is now flagged as a recurring blocker [f-1]. Pushpa's GenAI RAG eval set is also stalled on a heap-allocation issue [f-2]. Both feed the Escalations rollup.";
          if (q.includes('kpi') || q.includes('red'))
            return "The KPIs trending red are the DS&Algo pass-rate [k-1], down two weeks running, and the assessment-throughput metric [k-2]. Both originate from Pavan Teja's sub-team; see the source records for the underlying daily reports.";
          if (q.includes('attention') || q.includes('today'))
            return "Three things need attention: the missing-report streak on Vijay's Systems & Infra team [f-3], the overdue Topic Validator task [r-1004], and the DS&Algo pass-rate slip [k-1]. Start with the missing reports — Nudge has already pinged twice.";
          if (q.includes('summar') || q.includes('week'))
            return "This week the team logged work across Fullstack, GenAI and Aptitude. Highlights: shipped the labs portal config [r-1002] and cleared the English content QC backlog [r-1003]. Open risk: the NAT throttle blocker [f-1] is unresolved.";
          return "Grounded in your in-scope records: the most recent items are the Fullstack NAT throttle blocker [f-1], the labs portal config report [r-1002], and the DS&Algo pass-rate KPI [k-1]. Ask about blockers, KPIs, or what needs attention for a focused answer.";
        },
      };
    }
  </script>

  <!-- Data layer first (plain JS, attaches to window.CDC) -->
  <script src="data.js?v=28"></script>

  <!-- Supabase client + live data loader (falls back to bundled data.js) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js" crossorigin="anonymous"></script>
  <script src="supabase-client.js?v=27"></script>

  <!-- Components (JSX) -->
  <script type="text/babel" src="components.jsx?v=10"></script>
  <script type="text/babel" src="views-dashboard.jsx?v=17"></script>
  <script type="text/babel" src="views-copilot.jsx?v=15"></script>
  <script type="text/babel" src="views-ops.jsx?v=29"></script>
  <script type="text/babel" src="views-submit.jsx?v=24"></script>
  <script type="text/babel" src="views-worklogs.jsx?v=14"></script>
  <script type="text/babel" src="views-architecture.jsx?v=10"></script>
  <script type="text/babel" src="views-engram.jsx?v=11"></script>
  <script type="text/babel" src="views-farm.jsx?v=10"></script>
  <script type="text/babel" src="views-relay.jsx?v=29"></script>
  <script type="text/babel" src="views-codex.jsx?v=14"></script>
  <script type="text/babel" src="views-roles.jsx?v=14"></script>
  <script type="text/babel" src="views-catalog.jsx?v=2"></script>
  <script type="text/babel" src="tweaks-panel.jsx?v=10"></script>

  <script type="text/babel" src="views-auth.jsx?v=14"></script>

  <!-- Root app last -->
  <script type="text/babel" src="app.jsx?v=26"></script>
</body>
