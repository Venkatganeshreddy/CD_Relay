# Render blueprint for the CD_Relay MCP server.
# Render auto-detects this file; click "Apply" then set the two secret env vars.
services:
  - type: web
    name: cd-relay-mcp
    runtime: node
    rootDir: mcp
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: SUPABASE_SERVICE_KEY
        sync: false        # set manually in the dashboard (secret)
      - key: CONNECTOR_TOKEN
        sync: false        # set manually in the dashboard (secret)

  # Per-user OAuth connector for claude.ai — task reads/writes under each
  # teammate's own Relay login (see mcp/CONNECTOR-SETUP.md). No service key.
  - type: web
    name: cd-relay-mcp-oauth
    runtime: node
    rootDir: mcp
    plan: free
    buildCommand: npm install
    startCommand: node oauth-server.mjs
    healthCheckPath: /
    envVars:
      - key: TOKEN_SECRET
        generateValue: true   # Render mints a strong random secret
      - key: MCP_ALLOWED_EMAILS
        value: yedam.venkatganesh@nxtwave.co.in
